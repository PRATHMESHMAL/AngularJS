<section class="search-screen">
  <header class="search-shell">
    <div class="search-bar">
      <button type="button" class="icon-button" aria-label="Home">
        <span class="icon-home"></span>
      </button>
      <span class="icon-search"></span>
      <span class="query-text">bairan</span>
      <button type="button" class="plain-icon" aria-label="Clear search">✕</button>
      <span class="divider"></span>
      <button type="button" class="icon-button bag" aria-label="Open library">
        <span class="icon-bag"></span>
      </button>
    </div>

    <div class="filter-row">
      @for (filter of filters; track filter) {
        <button
          type="button"
          class="filter-pill"
          [class.active]="activeFilter === filter"
          (click)="setFilter(filter)">
          {{ filter }}
        </button>
      }
    </div>
  </header>

  <section class="top-result">
    <img class="cover-art large" [src]="track.artwork" [alt]="track.title + ' cover art'" />
    <div class="result-copy">
      <h1>{{ track.title }}</h1>
      <p>{{ track.subtitle }}</p>
    </div>
    <div class="top-actions">
      <button type="button" class="plus-button" aria-label="Save track">⊕</button>
      <button
        type="button"
        class="play-button"
        [disabled]="!previewReady"
        (click)="togglePlayback()"
        [attr.aria-label]="isPlaying ? 'Pause song preview' : 'Play song preview'">
        <span [class.pause-shape]="isPlaying" [class.play-shape]="!isPlaying"></span>
      </button>
    </div>
  </section>

  <p class="status-note">{{ statusText }}</p>

  <section class="results-list">
    @for (item of results; track item.title) {
      <article class="result-row">
        <img class="cover-art" [src]="item.artwork" [alt]="item.title + ' artwork'" />
        <div class="result-text">
          <h2>{{ item.title }}</h2>
          <p>{{ item.subtitle }}</p>
        </div>
        <span class="result-tag">{{ item.tag }}</span>
        <button type="button" class="row-plus" aria-label="Add item">⊕</button>
      </article>
    }
  </section>

  <footer class="player-footer">
    <div>
      <strong>{{ track.title }}</strong>
      <span>{{ track.artist }} • {{ track.duration }}</span>
    </div>
    <button type="button" class="spotify-link" (click)="openSpotifyTrack()">
      Open Full Song
    </button>
  </footer>

  <section class="spotify-embed-card">
    <p class="embed-label">Spotify Player</p>
    <iframe
      [src]="safeSpotifyEmbedUrl"
      title="Spotify player for Bairan by Banjaare"
      loading="lazy"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      referrerpolicy="strict-origin-when-cross-origin">
    </iframe>
  </section>

  <audio
    #songPreview
    [src]="track.previewUrl"
    preload="metadata"
    (ended)="handleEnded()">
  </audio>
</section>
